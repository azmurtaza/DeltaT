name: Bug report
description: Something in DeltaT is broken, wrong, or reading nonsense.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this.

        If you would rather not use GitHub, DeltaT has a **Report a bug or idea**
        button in Settings that sends the same thing straight to me, with no
        account needed. Either way works.

        **Found a security problem?** Please do not file it here. See
        [SECURITY.md](https://github.com/azmurtaza/DeltaT/blob/main/SECURITY.md).

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you see, and what did you expect to see instead?
      placeholder: |
        The CPU health score dropped to 40 overnight, but nothing about the
        machine changed. The likely cause chip says "degraded paste", and I
        repasted it two weeks ago.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: How can I reproduce it?
      description: >
        If it happens on demand, list the steps. If it just appeared on its own,
        say what you were doing at the time (gaming, idle, just woke from sleep,
        ran the fingerprint test). That is genuinely useful, so do not worry if
        you cannot make it happen again on command.
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: DeltaT version
      description: Settings shows this at the bottom. Please confirm it is the latest release first.
      placeholder: "2.1.4"
    validations:
      required: true

  - type: input
    id: machine
    attributes:
      label: PC model, CPU and GPU
      description: The exact model matters, especially for anything involving fans.
      placeholder: "Acer Nitro V 15 (ANV15-51), i5-13420H, RTX 3050 Laptop"
    validations:
      required: true

  - type: dropdown
    id: pawnio
    attributes:
      label: Is the PawnIO sensor driver installed?
      description: >
        Settings shows this under Sensor driver. Without it there is no CPU die
        temperature, package power, throttle counting or headroom, which explains
        a lot of "readings are missing" reports on its own.
      options:
        - "Yes"
        - "No"
        - "I do not know"
    validations:
      required: true

  - type: dropdown
    id: elevated
    attributes:
      label: Was DeltaT running as administrator?
      description: >
        It normally elevates itself on startup. Without it, CPU temperatures and
        drive SMART readings are unavailable.
      options:
        - "Yes"
        - "No"
        - "I do not know"
    validations:
      required: true

  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: "Windows 11 24H2"
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Screenshots or anything else
      description: >
        A screenshot of the dashboard is worth a lot for anything about a score,
        a reading, or the layout. Paste images straight into this box.
    validations:
      required: false
